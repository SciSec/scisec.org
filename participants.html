<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Special Guests</title>
<style>
/* 全局容器：4列网格，列宽均分 */
.guests-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  max-width: 1000px;
  margin: 0 auto;
}

/* 单个嘉宾卡片：内部拆成3个固定区域（图片/名字），强制对齐顶部 */
.guest-card {
  display: grid;
  /* 明确划分3行：图片行（固定高度）、名字行（固定高度）、介绍行（自动） */
  grid-template-rows: 150px 40px auto;
  gap: 10px; /* 区域之间的间距固定 */
}

/* 图片：占满图片行，尺寸统一 */
.guest-card img {
  width: 120px;
  height: 100%; /* 撑满图片行的150px高度 */
  object-fit: cover;
  border-radius: 4px;
}

/* 名字：占满名字行，强制顶部对齐（不管名字长短） */
.guest-card .name {
  font-size: 16px;
  font-weight: bold;
  margin: 0;
  /* 名字在固定行内垂直居中，保证所有名字的“第一行”在同一水平线 */
  display: flex;
  align-items: center;
}

/* 介绍：占满介绍行，强制顶部对齐 */
.guest-card .intro {
  font-size: 12px;
  line-height: 1.5;
  margin: 0;
}
/* 居中提示文字，横跨4列 */
.tip-text {
  grid-column: 1 / -1;
  text-align: center;
  font-size: 18px;
  padding: 40px 0;
}
</style>
</head>
<body>
<h1>Special Guests（Sort by Last Name）</h1>

<!-- 所有嘉宾卡片都放在同一个容器内 -->
<div class="guests-container">
  <div class="tip-text">To be announced</div>
</div>
</body>
</html>
